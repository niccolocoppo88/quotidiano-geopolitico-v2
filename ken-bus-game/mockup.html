<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ken Bus Adventure</title>
<style>
/* ===================== RESET & BASE ===================== */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --yellow: #FFD700;
  --yellow-dark: #E6B800;
  --red: #FF3B30;
  --blue: #007AFF;
  --pink: #FF6B9D;
  --green: #34C759;
  --purple: #AF52DE;
  --orange: #FF9500;
  --black: #000;
  --white: #fff;
  --gray-dark: #2C2C2E;
  --gray-mid: #8E8E93;
  --gray-light: #D1D1D6;
  --road: #444;
  --sky-top: #0a1628;
  --sky-bot: #1a4a7a;
  --building-1: #3a3028;
  --building-2: #4a3828;
  --building-3: #2a2840;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #000;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ===================== HOKUTO FONT OUTLINE ===================== */
.hokuto-text {
  font-family: 'Arial Black', Impact, sans-serif;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-shadow:
    3px 3px 0 #000,
    -1px -1px 0 #000,
    1px -1px 0 #000,
    -1px 1px 0 #000,
    3px -3px 0 #000,
    -3px 3px 0 #000,
    3px 3px 0 #000;
  -webkit-text-stroke: 1px #000;
  paint-order: stroke fill;
}
.hokuto-text-light {
  font-family: 'Arial Black', Impact, sans-serif;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-shadow:
    2px 2px 0 #000,
    -1px -1px 0 #000,
    1px -1px 0 #000,
    -1px 1px 0 #000;
  -webkit-text-stroke: 0.5px #000;
  paint-order: stroke fill;
}

/* ===================== SCREEN MANAGER ===================== */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ===================== TITLE SCREEN ===================== */
#title-screen {
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 60%, #2a4a6a 100%);
  overflow: hidden;
}
/* Stars */
.title-stars { position: absolute; inset: 0; pointer-events: none; }
@keyframes twinkle {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle var(--dur, 2s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}

/* Moon */
.title-moon {
  position: absolute; top: 8%; right: 12%;
  width: 80px; height: 80px;
  background: radial-gradient(circle at 35% 35%, #fffde0, #f5d060);
  border-radius: 50%;
  box-shadow: 0 0 40px #f5d060aa, 0 0 80px #f5d06055;
}
.title-moon::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; background: rgba(0,0,0,0.1);
  border-radius: 50%; top: 20%; left: 55%;
}

/* City silhouette for title */
.title-city { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; display: flex; align-items: flex-end; }
.title-building {
  display: inline-block; background: var(--gray-dark);
  border-top: 2px solid #000; position: relative; flex-shrink: 0;
}
.title-building::before {
  content: ''; position: absolute; inset: 4px;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 8px, rgba(255,220,100,0.3) 8px, rgba(255,220,100,0.3) 10px),
    repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(255,220,100,0.3) 8px, rgba(255,220,100,0.3) 10px);
}

/* Logo */
.title-logo-wrap { position: relative; z-index: 10; text-align: center; margin-bottom: 16px; }
.title-logo {
  font-size: clamp(2rem, 8vw, 4.5rem); line-height: 1;
  display: block; filter: drop-shadow(4px 4px 0 #000) drop-shadow(-2px -2px 0 #000);
}
.title-sub {
  font-size: clamp(0.7rem, 2.5vw, 1.1rem); color: var(--white);
  letter-spacing: 8px; margin-top: 4px; opacity: 0.8;
}

/* Bus on title */
.title-bus-wrap { position: relative; z-index: 9; margin-bottom: 24px; }

/* Ken arm animation */
@keyframes ken-punch-title {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(60px); }
  30% { transform: translateX(60px); }
  45% { transform: translateX(0); }
}
.title-ken-arm {
  position: absolute; right: -10px; top: 15px;
  width: 60px; height: 20px; background: #f5c89a;
  border: 3px solid #000; border-radius: 4px;
  transform-origin: left center;
  animation: ken-punch-title 2s ease-in-out infinite; z-index: 5;
}
.title-ken-arm::after {
  content: ''; position: absolute; right: -10px; top: 2px;
  width: 18px; height: 16px; background: #f5c89a;
  border: 3px solid #000; border-radius: 4px;
}

/* Aura */
@keyframes aura-pulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}
.title-bus-aura {
  position: absolute; inset: -15px; border-radius: 20px;
  background: radial-gradient(ellipse, rgba(255,215,0,0.4) 0%, transparent 70%);
  animation: aura-pulse 1.5s ease-in-out infinite;
  pointer-events: none; z-index: -1;
}

/* Buttons */
.title-buttons { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 8px; }
.btn {
  font-family: 'Arial Black', Impact, sans-serif;
  font-size: clamp(1rem, 3.5vw, 1.4rem); font-weight: 900;
  text-transform: uppercase; letter-spacing: 2px;
  border: 4px solid #000; border-radius: 8px;
  padding: 10px 40px; cursor: pointer;
  position: relative; transition: transform 0.1s;
  box-shadow: 4px 4px 0 #000;
}
.btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
.btn-primary { background: var(--yellow); color: var(--black); animation: btn-glow 2s ease-in-out infinite; }
@keyframes btn-glow {
  0%, 100% { box-shadow: 4px 4px 0 #000, 0 0 10px rgba(255,215,0,0.3); }
  50% { box-shadow: 4px 4px 0 #000, 0 0 30px rgba(255,215,0,0.8); }
}
.btn-secondary { background: var(--white); color: var(--black); }
.btn-danger { background: var(--red); color: var(--white); }
.title-version { position: absolute; bottom: 10px; font-size: 0.7rem; color: rgba(255,255,255,0.4); z-index: 10; }

/* ===================== GAMEPLAY SCREEN ===================== */
#gameplay-screen {
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 50%, #1a3a5a 100%);
  overflow: hidden;
}
.game-bg-sky { position: absolute; inset: 0; }
.game-bg-stars { position: absolute; top: 0; left: 0; right: 0; height: 50%; }
.game-star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur, 3s) ease-in-out infinite; animation-delay: var(--delay, 0s); }
.game-bg-moon { position: absolute; top: 5%; right: 8%; width: 50px; height: 50px; background: radial-gradient(circle at 35% 35%, #fffde0, #f5d060); border-radius: 50%; box-shadow: 0 0 20px #f5d06088; }

.game-bg-buildings { position: absolute; bottom: 25%; left: 0; right: 0; height: 45%; overflow: hidden; }
@keyframes scroll-bg { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.game-buildings-row { display: flex; align-items: flex-end; height: 100%; position: absolute; bottom: 0; left: 0; animation: scroll-bg 25s linear infinite; will-change: transform; }
.game-building { flex-shrink: 0; background: var(--building-1); border-top: 3px solid #000; position: relative; }
.game-building.windows::before {
  content: ''; position: absolute; inset: 6px;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 12px, rgba(255,220,100,0.4) 12px, rgba(255,220,100,0.4) 16px),
    repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(255,220,100,0.4) 10px, rgba(255,220,100,0.4) 14px);
}
.game-building.windows-dark::before {
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 12px, rgba(100,160,255,0.3) 12px, rgba(100,160,255,0.3) 16px),
    repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(100,160,255,0.3) 10px, rgba(100,160,255,0.3) 14px);
}

.game-bg-trees { position: absolute; bottom: 20%; left: 0; right: 0; height: 10%; overflow: hidden; }
.game-trees-row { display: flex; align-items: flex-end; position: absolute; bottom: 0; left: 0; animation: scroll-bg 18s linear infinite; will-change: transform; }

.game-road { position: absolute; bottom: 0; left: 0; right: 0; height: 22%; background: var(--road); border-top: 4px solid #666; }
@keyframes scroll-road { from { transform: translateY(-50%) translateX(0); } to { transform: translateY(-50%) translateX(-80px); } }
.game-road-stripes { position: absolute; top: 50%; left: 0; transform: translateY(-50%); display: flex; gap: 40px; animation: scroll-road 1s linear infinite; }
.game-road-stripe { width: 60px; height: 8px; background: var(--yellow); flex-shrink: 0; }

/* ===================== HUD ===================== */
.game-hud {
  position: absolute; top: 0; left: 0; right: 0; height: 55px;
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; z-index: 100;
}
.hud-score { display: flex; flex-direction: column; align-items: flex-start; }
.hud-label { font-size: clamp(0.5rem, 1.5vw, 0.65rem); color: var(--gray-light); letter-spacing: 2px; text-transform: uppercase; }
.hud-value { font-family: 'Arial Black', Impact, sans-serif; font-size: clamp(1rem, 3vw, 1.5rem); color: var(--yellow); text-shadow: 2px 2px 0 #000, -1px -1px 0 #000; line-height: 1; }
.hud-kids { display: flex; align-items: center; gap: 6px; }
.hud-kids-value { font-family: 'Arial Black', Impact, sans-serif; font-size: clamp(0.9rem, 2.5vw, 1.3rem); color: var(--white); text-shadow: 2px 2px 0 #000; }
.hud-hearts { display: flex; gap: 4px; }

/* Power-up bar */
.game-powerup-bar { position: absolute; bottom: 23%; left: 12px; z-index: 100; display: flex; flex-direction: column; gap: 4px; opacity: 0; transition: opacity 0.3s; }
.game-powerup-bar.visible { opacity: 1; }
.powerup-slot { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.7); border: 2px solid #555; border-radius: 6px; padding: 4px 8px; }
.powerup-icon { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.powerup-timer-bar { width: 80px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
.powerup-timer-fill { height: 100%; border-radius: 3px; transition: width 0.1s linear; }
.powerup-name { font-size: 0.6rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; min-width: 40px; }

/* ===================== GAME AREA ===================== */
.game-area { position: absolute; top: 55px; bottom: 0; left: 0; right: 0; }

.bus-container { position: absolute; left: 12%; transition: top 0.08s linear; z-index: 50; }
@keyframes bus-idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
.bus-idle { animation: bus-idle 0.6s ease-in-out infinite; }

/* Ken punch animation */
@keyframes ken-punch-out { 0% { transform: translateX(0) scaleX(1); } 30% { transform: translateX(80px) scaleX(1.3); } 60% { transform: translateX(80px) scaleX(1.3); } 100% { transform: translateX(0) scaleX(1); } }
.ken-punching { animation: ken-punch-out 0.4s ease-out forwards; }

/* Bus shake */
@keyframes bus-shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px) rotate(-2deg); } 40% { transform: translateX(8px) rotate(2deg); } 60% { transform: translateX(-5px) rotate(-1deg); } 80% { transform: translateX(5px) rotate(1deg); } }
.bus-shake { animation: bus-shake 0.3s ease-out; }

/* Aura */
@keyframes aura-ready { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
@keyframes aura-cooldown { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.5; } }

/* Ken hit flash */
@keyframes ken-hit-flash { 0%, 100% { filter: none; } 50% { filter: brightness(0.3) sepia(1) hue-rotate(-50deg) saturate(5); } }
.ken-hit { animation: ken-hit-flash 0.2s ease-out 3; }

/* ===================== OBSTACLES ===================== */
.obstacle { position: absolute; z-index: 40; }
@keyframes move-left { from { transform: translateX(0); } to { transform: translateX(-110vw); } }
.obs-animate { animation: move-left var(--dur, 6s) linear forwards; }
@keyframes obs-explode { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }
.obs-explode { animation: obs-explode 0.3s ease-out forwards; }
@keyframes score-popup { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-60px) scale(1.3); opacity: 0; } }
.score-popup { position: absolute; font-family: 'Arial Black', Impact, sans-serif; font-size: 1.2rem; color: var(--yellow); text-shadow: 2px 2px 0 #000; pointer-events: none; animation: score-popup 0.8s ease-out forwards; z-index: 200; }
@keyframes particle-burst { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
.particle { position: absolute; width: 8px; height: 8px; background: var(--yellow); border-radius: 50%; pointer-events: none; animation: particle-burst 0.6s ease-out forwards; }

/* ===================== GAME OVER SCREEN ===================== */
#gameover-screen { background: rgba(0,0,0,0.85); overflow: hidden; }
.go-title { font-size: clamp(2.5rem, 12vw, 6rem); color: var(--red); line-height: 1; animation: go-glitch 3s ease-in-out infinite; }
@keyframes go-glitch {
  0%, 90%, 100% { text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 0 0 20px rgba(255,59,48,0.5); transform: none; }
  92% { text-shadow: -4px 2px 0 #000, 2px -2px 0 #0ff; transform: skewX(-3deg); }
  94% { text-shadow: 4px -2px 0 #000, -2px 2px 0 #f0f; transform: skewX(2deg); }
  96% { text-shadow: 2px 2px 0 #000, -2px -2px 0 #0ff; transform: none; }
}
.go-score-wrap { text-align: center; margin: 20px 0; }
.go-score-label { font-size: clamp(0.7rem, 2vw, 1rem); color: var(--gray-light); letter-spacing: 4px; text-transform: uppercase; }
.go-score-value { font-family: 'Arial Black', Impact, sans-serif; font-size: clamp(2rem, 8vw, 4rem); color: var(--yellow); text-shadow: 3px 3px 0 #000; }
.go-kids-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0 30px; }
.go-kids-label { font-size: clamp(0.8rem, 2.5vw, 1.1rem); color: var(--white); text-shadow: 2px 2px 0 #000; }
.go-buttons { display: flex; flex-direction: column; gap: 12px; align-items: center; }

/* ===================== PAUSE OVERLAY ===================== */
#pause-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
#pause-overlay.active { opacity: 1; pointer-events: all; }
.pause-title { font-size: clamp(2rem, 8vw, 4rem); color: var(--white); }
.pause-buttons { display: flex; flex-direction: column; gap: 12px; }

/* ===================== SCREEN FLASH ===================== */
.screen-flash { position: fixed; inset: 0; pointer-events: none; z-index: 300; opacity: 0; transition: opacity 0.1s; }
.screen-flash.red { background: rgba(255,0,0,0.3); }
.screen-flash.active { opacity: 1; }

/* ===================== HINT ===================== */
.tap-hint { position: absolute; bottom: 30%; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; animation: hint-blink 2s ease-in-out infinite; }
@keyframes hint-blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

@media (max-width: 600px) {
  .game-hud { padding: 6px 10px; }
  .powerup-timer-bar { width: 60px; }
}
</style>
</head>

  <div class="title-logo-wrap">
    <span class="title-logo hokuto-text" id="title-logo-text"></span>

        <rect x="10" y="20" width="200" height="70" rx="10" ry="10" fill="#FFD700" stroke="#000" stroke-width="4"/>

        <rect x="25" y="28" width="30" height="22" rx="4" fill="#87CEEB" stroke="#000" stroke-width="3"/>
        <rect x="65" y="28" width="30" height="22" rx="4" fill="#87CEEB" stroke="#000" stroke-width="3"/>
        <rect x="105" y="28" width="30" height="22" rx="4" fill="#87CEEB" stroke="#000" stroke-width="3"/>

        <rect x="25" y="52" width="25" height="38" rx="3" fill="#D4A800" stroke="#000" stroke-width="2"/>
        <!-- Ken -->

      <circle cx="11" cy="9" r="1.5" fill="#000"/><circle cx="19" cy="9" r="1.5" fill="#000"/>

<div class="screen-flash red" id="screen-flash"></div>

<script>
/* ===================== STATE ===================== */
let gameState = 'title';
let score = 0, kidsCollected = 0, lives = 3;
let busTargetY = 50;
let punchCooldown = false, punchReady = true;
let powerUpActive = false, powerUpType = '';
let spawnObs, spawnKid, spawnPU;
let rafId = null;
let allObstacles = [];

/* ===================== UTILS ===================== */
const $ = id => document.getElementById(id);
const pad = (n, len) => String(n).padStart(len, '0');
const rand = (min, max) => Math.random() * (max - min) + min;
const randInt = (min, max) => Math.floor(rand(min, max + 1));

/* ===================== SCREEN ===================== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('pause-overlay').classList.remove('active');
  if (id) $(id).classList.add('active');
}

/* ===================== TITLE INIT ===================== */
function buildTitleLogo() {
  const el = $('title-logo-text');
  el.innerHTML = '';
  [['KEN','#FFD700'],['BUS','#FF3B30'],['ADVENTURE','#fff']].forEach(([w,color],i) => {
    const span = document.createElement('span');
    span.textContent = w;
    span.style.color = color;
    if (i < 2) el.appendChild(document.createElement('br'));
    el.appendChild(span);
  });
}
function buildTitleStars() {
  const c = $('title-stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${rand(0,100)}%;top:${rand(0,60)}%;width:${rand(1,3)}px;height:${rand(1,3)}px;--dur:${rand(1,4)}s;--delay:${rand(0,3)}s;opacity:${rand(0.3,1)};`;
    c.appendChild(s);
  }
}
function buildTitleCity() {
  const c = $('title-city');
  const blds = [
    {w:60,h:120},{w:40,h:80},{w:80,h:150},{w:50,h:100},{w:70,h:130},
    {w:45,h:90},{w:90,h:160},{w:55,h:110},{w:65,h:95},{w:40,h:70},
    {w:75,h:140},{w:50,h:85},{w:60,h:120},{w:80,h:155},{w:45,h:75},
  ];
  blds.forEach(b => {
    const d = document.createElement('div');
    d.className = 'title-building windows';
    d.style.cssText = `width:${b.w}px;height:${b.h}px;`;
    c.appendChild(d);
  });
}

/* ===================== GAMEPLAY INIT ===================== */
function buildGPStars() {
  const c = $('gp-stars');
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'game-star';
    s.style.cssText = `left:${rand(0,100)}%;top:${rand(0,50)}%;width:${rand(1,2.5)}px;height:${rand(1,2.5)}px;--dur:${rand(2,5)}s;--delay:${rand(0,4)}s;`;
    c.appendChild(s);
  }
}
function buildGPBuildings() {
  const row = $('gp-buildings-row');
  row.innerHTML = '';
  const colors = ['#3a3028','#4a3828','#2a2840','#3d3040','#2d3828'];
  const W = window.innerWidth;
  const totalW = W * 2 + 400;
  let x = 0;
  const blds = [];
  while (x < totalW) {
    const h = randInt(80, 200), w = randInt(60, 120);
    blds.push({x, w, h, color: colors[randInt(0,4)], hasWindows: Math.random() > 0.3});
    x += w + randInt(2, 8);
  }
  [...blds, ...blds.map(b => ({...b, x: b.x + totalW}))].forEach(b => {
    const d = document.createElement('div');
    d.className = `game-building ${b.hasWindows ? (Math.random()>0.5?'windows':'windows-dark') : ''}`;
    d.style.cssText = `width:${b.w}px;height:${b.h}px;background:${b.color};`;
    row.appendChild(d);
  });
  row.style.animationDuration = '25s';
}
function buildGPTrees() {
  const row = $('gp-trees-row');
  row.innerHTML = '';
  const W = window.innerWidth;
  const totalW = W * 2 + 400;
  let x = 0;
  while (x < totalW) {
    const h = randInt(30, 60), w = randInt(20, 35);
    const tree = document.createElement('div');
    tree.style.cssText = `width:0;height:0;border-left:${w/2}px solid transparent;border-right:${w/2}px solid transparent;border-bottom:${h}px solid #2d5a27;margin:0 5px;`;
    row.appendChild(tree);
    x += w + randInt(10, 25);
  }
  row.style.animationDuration = '18s';
}
function buildGPRoad() {
  const c = $('gp-road-stripes');
  c.innerHTML = '';
  const count = Math.ceil(window.innerWidth / 80) + 4;
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'game-road-stripe';
    c.appendChild(s);
  }
}
function buildHUDHearts() {
  const c = $('hud-hearts');
  c.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','hud-heart');
    svg.setAttribute('viewBox','0 0 30 28');
    svg.innerHTML = `<path d="M15 25 C5 17 1 11 1 7 C1 3 4 1 7 1 C10 1 12 3 15 6 C18 3 20 1 23 1 C26 1 29 3 29 7 C29 11 25 17 15 25Z" fill="${i < lives ? '#FF3B30' : '#444'}" stroke="#000" stroke-width="2"/>`;
    c.appendChild(svg);
  }
}
function updateHUD() {
  $('hud-score').textContent = pad(score, 5);
  $('hud-kids').textContent = kidsCollected;
  buildHUDHearts();
}

/* ===================== SPAWN OBSTACLES ===================== */
const OBS_TYPES = [
  {
    name:'car-green', w:70, h:45,
    svg:`<svg width="70" height="45" viewBox="0 0 70 45">
      <rect x="2" y="12" width="66" height="28" rx="6" fill="#2ECC71" stroke="#000" stroke-width="3"/>
      <rect x="10" y="4" width="35" height="20" rx="4" fill="#2ECC71" stroke="#000" stroke-width="2"/>
      <rect x="14" y="8" width="12" height="10" rx="2" fill="#87CEEB" stroke="#000" stroke-width="1.5"/>
      <rect x="28" y="8" width="12" height="10" rx="2" fill="#87CEEB" stroke="#000" stroke-width="1.5"/>
      <circle cx="18" cy="42" r="8" fill="#333" stroke="#000" stroke-width="2"/><circle cx="18" cy="42" r="3" fill="#888"/>
      <circle cx="52" cy="42" r="8" fill="#333" stroke="#000" stroke-width="2"/><circle cx="52" cy="42" r="3" fill="#888"/>
      <rect x="58" y="18" width="8" height="6" rx="2" fill="#FFFF99" stroke="#000" stroke-width="1.5"/>
    </svg>`
  },
  {
    name:'car-red', w:70, h:45,
    svg:`<svg width="70" height="45" viewBox="0 0 70 45">
      <rect x="2" y="12" width="66" height="28" rx="6" fill="#E74C3C" stroke="#000" stroke-width="3"/>
      <rect x="10" y="4" width="35" height="20" rx="4" fill="#E74C3C" stroke="#000" stroke-width="2"/>
      <rect x="14" y="8" width="12" height="10" rx="2" fill="#87CEEB" stroke="#000" stroke-width="1.5"/>
      <rect x="28" y="8" width="12" height="10" rx="2" fill="#87CEEB" stroke="#000" stroke-width="1.5"/>
      <circle cx="18" cy="42" r="8" fill="#333" stroke="#000" stroke-width="2"/><circle cx="18" cy="42" r="3" fill="#888"/>
      <circle cx="52" cy="42" r="8" fill="#333" stroke="#000" stroke-width="2"/><circle cx="52" cy="42" r="3" fill="#888"/>
      <rect x="58" y="18" width="8" height="6" rx="2" fill="#FFFF99" stroke="#000" stroke-width="1.5"/>
    </svg>`
  },
  {
    name:'truck', w:100, h:60,
    svg:`<svg width="100" height="60" viewBox="0 0 100 60">
      <rect x="2" y="10" width="96" height="40" rx="5" fill="#7F8C8D" stroke="#000" stroke-width="3"/>
      <rect x="65" y="4" width="30" height="28" rx="4" fill="#7F8C8D" stroke="#000" stroke-width="2"/>
      <rect x="70" y="8" width="10" height="10" rx="2" fill="#87CEEB" stroke="#000" stroke-width="1.5"/>
      <circle cx="22" cy="52" r="9" fill="#333" stroke="#000" stroke-width="2"/><circle cx="22" cy="52" r="4" fill="#888"/>
      <circle cx="50" cy="52" r="9" fill="#333" stroke="#000" stroke-width="2"/><circle cx="50" cy="52" r="4" fill="#888"/>
      <circle cx="78" cy="52" r="9" fill="#333" stroke="#000" stroke-width="2"/><circle cx="78" cy="52" r="4" fill="#888"/>
    </svg>`
  },
  {
    name:'sign', w:35, h:60,
    svg:`<svg width="35" height="60" viewBox="0 0 35 60">
      <rect x="13" y="20" width="10" height="40" fill="#888" stroke="#000" stroke-width="2"/>
      <rect x="2" y="2" width="32" height="22" rx="3" fill="#FFCC00" stroke="#000" stroke-width="3"/>
      <text x="18" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">STOP</text>
    </svg>`
  }
];

function spawnObstacle() {
  if (gameState !== 'playing') return;
  const area = $('game-area');
  const areaH = area.offsetHeight - 60;
  const type = OBS_TYPES[randInt(0, OBS_TYPES.length - 1)];
  const speed = { 'car-green': 5, 'car-red': 3.5, 'truck': 7, 'sign': 8 }[type.name];
  const duration = (window.innerWidth * 2.5) / speed;
  const top = rand(10, Math.max(10, areaH - type.h));

  const div = document.createElement('div');
  div.className = 'obstacle';
  div.style.cssText = `right:-${type.w+20}px;top:${top}px;`;
  div.innerHTML = type.svg;
  div.dataset.type = type.name;
  div.style.animation = `move-left ${duration}s linear forwards`;
  div.addEventListener('animationend', () => div.remove());
  area.appendChild(div);
  allObstacles.push(div);
}

const KID_COLORS = ['#FF6B9D','#4ECDC4','#FF9500','#AF52DE'];
function spawnKid() {
  if (gameState !== 'playing') return;
  const area = $('game-area');
  const areaH = area.offsetHeight - 60;
  const color = KID_COLORS[randInt(0, KID_COLORS.length-1)];
  const div = document.createElement('div');
  div.className = 'obstacle';
  div.style.cssText = `right:-60px;top:${rand(10, Math.max(10, areaH-50))}px;animation:move-left ${rand(5,8)}s linear forwards;`;
  div.innerHTML = `<svg width="35" height="45" viewBox="0 0 35 45">
    <circle cx="17" cy="11" r="9" fill="#F5C89A" stroke="#000" stroke-width="2"/>
    <rect x="5" y="20" width="24" height="25" rx="5" fill="${color}" stroke="#000" stroke-width="2"/>
    <circle cx="13" cy="10" r="1.5" fill="#000"/><circle cx="21" cy="10" r="1.5" fill="#000"/>
    <rect x="12" y="14" width="10" height="2" rx="1" fill="#000"/>
    <path d="M8 8 Q17 2 26 8" stroke="#5D3A1A" stroke-width="3" fill="none"/>
    <rect x="26" y="22" width="8" height="5" rx="2" fill="#F5C89A" stroke="#000" stroke-width="1.5" transform="rotate(-30 26 22)"/>
  </svg>`;
  div.dataset.isKid = 'true';
  div.addEventListener('animationend', () => div.remove());
  area.appendChild(div);
  allObstacles.push(div);
}

const PU_TYPES = [
  {name:'SCUDO', color:'#FFD700', icon:'&#128737;', dur:8000},
  {name:'TURBO', color:'#34C759', icon:'&#128640;', dur:6000},
  {name:'ROZZI', color:'#FF3B30', icon:'&#128293;', dur:10000},
  {name:'BUS 2X', color:'#007AFF', icon:'&#128658;', dur:12000},
];
function spawnPowerUp() {
  if (gameState !== 'playing' || powerUpActive) return;
  const area = $('game-area');
  const areaH = area.offsetHeight - 60;
  const type = PU_TYPES[randInt(0, PU_TYPES.length-1)];
  const div = document.createElement('div');
  div.className = 'obstacle';
  div.style.cssText = `right:-60px;top:${rand(10, Math.max(10, areaH-50))}px;animation:move-left 6s linear forwards;`;
  div.innerHTML = `<svg width="45" height="45" viewBox="0 0 45 45">
    <circle cx="22" cy="22" r="20" fill="${type.color}" stroke="#000" stroke-width="3" opacity="0.9"/>
    <text x="22" y="29" text-anchor="middle" font-size="20">${type.icon}</text>
    <circle cx="22" cy="22" r="20" fill="none" stroke="${type.color}" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="18;24;18" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1s" repeatCount="indefinite"/>
    </circle>
  </svg>`;
  div.dataset.isPowerUp = 'true';
  div.dataset.puName = type.name;
  div.dataset.puColor = type.color;
  div.dataset.puIcon = type.icon;
  div.dataset.puDur = type.dur;
  div.addEventListener('animationend', () => div.remove());
  area.appendChild(div);
  allObstacles.push(div);
}

/* ===================== PUNCH ===================== */
function triggerPunch() {
  if (gameState !== 'playing' || punchCooldown || !punchReady) return;
  punchReady = false;
  punchCooldown = true;

  const arm = $('ken-punch-arm');
  arm.style.opacity = '1';
  arm.style.transform = 'scaleX(2.5)';

  const busRect = $('bus-container').getBoundingClientRect();
  const punchX = busRect.right;
  const punchY = busRect.top + busRect.height * 0.5;

  allObstacles.forEach(obs => {
    if (obs.dataset.isKid || obs.dataset.isPowerUp || obs.dataset.hit || obs.classList.contains('obs-explode')) return;
    const r = obs.getBoundingClientRect();
    if (r.right > punchX && r.left < punchX + 120 && r.top < punchY + 40 && r.bottom > punchY - 40) {
      obs.dataset.hit = 'true';
      obs.classList.add('obs-explode');
      score += 50;
      showScorePopup(obs, '+50');
      spawnParticles(obs);
      setTimeout(() => { if (obs.parentNode) obs.remove(); }, 300);
      updateHUD();
    }
  });

  setTimeout(() => {
    arm.style.opacity = '0';
    arm.style.transform = 'scaleX(1)';
    punchCooldown = false;
    setTimeout(() => { punchReady = true; }, 1300); // ready when aura gold (total 1500ms from punch)
  }, 200);

  $('bus-aura').style.background = 'radial-gradient(ellipse,rgba(255,50,50,0.4) 0%,transparent 70%)';
  setTimeout(() => { $('bus-aura').style.background = 'radial-gradient(ellipse,rgba(255,215,0,0.5) 0%,transparent 70%)'; }, 1500);
}

/* ===================== EFFECTS ===================== */
function showScorePopup(el, text) {
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = text;
  const r = el.getBoundingClientRect();
  const area = $('game-area').getBoundingClientRect();
  popup.style.left = (r.left - area.left + r.width/2) + 'px';
  popup.style.top = (r.top - area.top) + 'px';
  $('game-area').appendChild(popup);
  setTimeout(() => popup.remove(), 800);
}
function spawnParticles(el) {
  const r = el.getBoundingClientRect();
  const area = $('game-area').getBoundingClientRect();
  const cx = r.left - area.left + r.width/2;
  const cy = r.top - area.top + r.height/2;
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${cx}px;top:${cy}px;background:${['#FFD700','#FF6B9D','#4ECDC4','#fff'][i%4]};`;
    const angle = (i/6)*Math.PI*2, dist = rand(30,60);
    p.style.setProperty('--tx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--ty', Math.sin(angle)*dist+'px');
    $('game-area').appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
}
function flashScreen() {
  const f = $('screen-flash');
  f.classList.add('active');
  setTimeout(() => f.classList.remove('active'), 200);
}
function shakeBus() {
  const bus = $('bus-container');
  bus.classList.remove('bus-shake');
  void bus.offsetWidth;
  bus.classList.add('bus-shake');
  setTimeout(() => bus.classList.remove('bus-shake'), 300);
}

/* ===================== GAME CONTROL ===================== */
function startGame() {
  gameState = 'playing';
  score = 0; kidsCollected = 0; lives = 3;
  busTargetY = 50; powerUpActive = false;
  punchReady = true; punchCooldown = false;

  document.querySelectorAll('#game-area .obstacle, #game-area .score-popup, #game-area .particle').forEach(el => el.remove());
  allObstacles = [];
  clearInterval(spawnObs); clearInterval(spawnKid); clearInterval(spawnPU);

  buildGPBuildings(); buildGPTrees(); buildGPRoad();
  buildHUDHearts(); updateHUD();
  showScreen('gameplay-screen');

  const hint = $('tap-hint');
  if (hint) { hint.style.opacity = '1'; setTimeout(() => { hint.style.transition='opacity 1s'; hint.style.opacity='0'; }, 4000); }

  spawnObs = setInterval(() => { if (gameState==='playing' && Math.random()>0.3) spawnObstacle(); }, randInt(1500,3000));
  spawnKid  = setInterval(() => { if (gameState==='playing' && Math.random()>0.4) spawnKid(); }, randInt(2000,4000));
  spawnPU   = setInterval(() => { if (gameState==='playing') spawnPowerUp(); }, randInt(15000,30000));

  setTimeout(spawnObstacle, 500);
  setTimeout(spawnKid, 1200);
}
function pauseGame() {
  if (gameState !== 'playing') return;
  gameState = 'paused';
  $('pause-overlay').classList.add('active');
  clearInterval(spawnObs); clearInterval(spawnKid); clearInterval(spawnPU);
}
function resumeGame() {
  if (gameState !== 'paused') return;
  gameState = 'playing';
  $('pause-overlay').classList.remove('active');
  spawnObs = setInterval(() => { if (gameState==='playing' && Math.random()>0.3) spawnObstacle(); }, randInt(1500,3000));
  spawnKid  = setInterval(() => { if (gameState==='playing' && Math.random()>0.4) spawnKid(); }, randInt(2000,4000));
  spawnPU   = setInterval(() => { if (gameState==='playing') spawnPowerUp(); }, randInt(15000,30000));
}
function gameOver() {
  gameState = 'gameover';
  clearInterval(spawnObs); clearInterval(spawnKid); clearInterval(spawnPU);
  $('go-score').textContent = pad(score, 5);
  $('go-kids').textContent = kidsCollected + ' BAMBINI SALVATI';
  showScreen('gameover-screen');
}
function loseLife() {
  if (powerUpActive) return;
  lives--;
  flashScreen(); shakeBus(); updateHUD();
  if (lives <= 0) gameOver();
}
function retryGame() { startGame(); }
function goToMenu() {
  gameState = 'title';
  clearInterval(spawnObs); clearInterval(spawnKid); clearInterval(spawnPU);
  document.querySelectorAll('#game-area .obstacle, #game-area .score-popup, #game-area .particle').forEach(el => el.remove());
  allObstacles = [];
  showScreen('title-screen');
}
function showInfo() {
  alert('KEN BUS ADVENTURE\n\nCome si gioca:\n↑↓ / Swipe = Muovi bus\nSPACE / TAP = Ken Punch!\n\nRaccogli i bambini 🧒,\ndistruggi gli ostacoli!\n\nStile: Hokuto no Ken Animation');
}

/* ===================== POWER-UPS ===================== */
function activatePowerUp(name, color, icon, dur) {
  powerUpActive = true; powerUpType = name;
  const bar = $('powerup-bar');
  bar.classList.add('visible');
  $('powerup-icon').innerHTML = `<span style="font-size:18px">${icon}</span>`;
  $('powerup-icon').style.background = color;
  $('powerup-fill').style.background = color;
  $('powerup-name').textContent = name;
  const startTime = Date.now();
  const fill = $('powerup-fill');
  const timerInterval = setInterval(() => {
    if (gameState !== 'playing') { clearInterval(timerInterval); return; }
    const elapsed = Date.now() - startTime;
    const pct = Math.max(0, 100 - (elapsed/dur)*100);
    fill.style.width = pct + '%';
    if (elapsed >= dur) {
      clearInterval(timerInterval);
      powerUpActive = false;
      bar.classList.remove('visible');
    }
  }, 100);
}

/* ===================== COLLISION ===================== */
function checkCollisions() {
  if (gameState !== 'playing') return;
  const busRect = $('bus-container').getBoundingClientRect();
  const area = $('game-area').getBoundingClientRect();

  allObstacles.forEach(obs => {
    if (!obs.parentNode) return;
    const r = obs.getBoundingClientRect();
    if (r.right < busRect.left || r.left > busRect.right || r.bottom < busRect.top || r.top > busRect.bottom) return;

    if (obs.dataset.isKid === 'true' && !obs.dataset.collected) {
      obs.dataset.collected = 'true';
      kidsCollected++; score += 10;
      spawnParticles(obs);
      obs.remove();
      updateHUD();
    } else if (obs.dataset.isPowerUp === 'true' && !obs.dataset.collected) {
      obs.dataset.collected = 'true';
      activatePowerUp(obs.dataset.puName, obs.dataset.puColor, obs.dataset.puIcon, parseInt(obs.dataset.puDur));
      obs.remove();
    } else if (!obs.dataset.isKid && !obs.dataset.isPowerUp && !obs.dataset.hit) {
      obs.dataset.hit = 'true';
      if (powerUpActive) {
        obs.classList.add('obs-explode');
        score += 50; showScorePopup(obs, '+50'); spawnParticles(obs);
        setTimeout(() => { if (obs.parentNode) obs.remove(); }, 300);
        updateHUD();
      } else {
        loseLife();
      }
    }
  });
}

/* ===================== BUS MOVEMENT ===================== */
let touchStartY = null;
function moveBus(dir) {
  busTargetY = Math.max(5, Math.min(75, busTargetY + dir * 5));
}
function updateBusPosition() {
  const bus = $('bus-container');
  const area = $('game-area');
  const areaH = area.offsetHeight;
  const busH = 80;
  const minTop = area.offsetTop + 5;
  const maxTop = area.offsetTop + areaH - busH - 5;
  const targetPx = minTop + (busTargetY / 100) * (maxTop - minTop);
  bus.style.top = targetPx + 'px';
}

/* ===================== INPUT ===================== */
document.addEventListener('keydown', e => {
  if (e.code === 'ArrowUp' || e.code === 'KeyW') moveBus(-1);
  else if (e.code === 'ArrowDown' || e.code === 'KeyS') moveBus(1);
  else if (e.code === 'Space') { e.preventDefault(); triggerPunch(); }
  else if (e.code === 'Escape') {
    if (gameState === 'playing') pauseGame();
    else if (gameState === 'paused') resumeGame();
  }
});
document.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
  if (gameState === 'playing') triggerPunch();
}, {passive:true});
document.addEventListener('touchmove', e => {
  if (touchStartY === null || gameState !== 'playing') return;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dy) > 10) { moveBus(dy > 0 ? 1 : -1); touchStartY = e.touches[0].clientY; }
}, {passive:true});
document.addEventListener('touchend', () => { touchStartY = null; }, {passive:true});
$('gameplay-screen').addEventListener('click', e => { if (gameState === 'playing') triggerPunch(); });

/* ===================== BUTTON WIRING ===================== */
$('btn-avvia').addEventListener('click', startGame);
$('btn-info').addEventListener('click', showInfo);
$('btn-retry').addEventListener('click', retryGame);
$('btn-menu').addEventListener('click', goToMenu);
$('btn-resume').addEventListener('click', resumeGame);
$('btn-pause-menu').addEventListener('click', goToMenu);

/* ===================== GAME LOOP ===================== */
function gameLoopFn() {
  if (gameState === 'playing') {
    updateBusPosition();
    checkCollisions();
  }
  rafId = requestAnimationFrame(gameLoopFn);
}

/* ===================== INIT ===================== */
buildTitleLogo();
buildTitleStars();
buildTitleCity();
buildGPStars();
buildHUDHearts();
gameLoopFn();
</script>
